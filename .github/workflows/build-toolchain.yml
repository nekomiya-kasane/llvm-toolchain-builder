name: Build LLVM Toolchain (Ubuntu 16.04)
# Architecture: actions/* steps (checkout, cache, artifact) run on the runner
# host (ubuntu-latest, glibc 2.35+). All compilation runs inside ubuntu:16.04
# via `docker run` with bind mounts — this avoids the Node.js 20 / glibc 2.28
# incompatibility that blocks actions/* inside a 16.04 container.

on:
  workflow_dispatch:
    inputs:
      llvm_version:
        description: 'LLVM version to build'
        required: true
        default: '21.1.1'
      build_p2996:
        description: 'Also build p2996 variant'
        type: boolean
        default: true
      skip_bootstrap:
        description: 'Skip bootstrap (use cached)'
        type: boolean
        default: false
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - '.github/workflows/build-toolchain.yml'

env:
  BOOTSTRAP_PREFIX: /opt/bootstrap
  STAGE1_PREFIX: /opt/stage1
  LLVM_VERSION: ${{ github.event.inputs.llvm_version || '21.1.1' }}
  IMAGE: ubuntu:16.04

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # Job 1: Bootstrap — build GCC, CMake, Python, Ninja, SWIG, and dependencies
  # ===========================================================================
  bootstrap:
    name: Bootstrap Tools
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghcli /opt/hostedtoolcache || true
          df -h /

      - name: Pull container image
        run: docker pull ${{ env.IMAGE }}

      - name: Cache bootstrap
        id: cache-bootstrap
        uses: actions/cache@v4
        with:
          path: /opt/bootstrap
          key: bootstrap-v7-gcc14.2-cmake3.31-py3.12-${{ hashFiles('scripts/bootstrap.sh') }}
          restore-keys: |
            bootstrap-v7-gcc14.2-cmake3.31-py3.12-

      - name: Build bootstrap tools
        if: steps.cache-bootstrap.outputs.cache-hit != 'true'
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/src:ro \
            -v /opt/bootstrap:/opt/bootstrap \
            -e BOOTSTRAP_PREFIX=/opt/bootstrap \
            ${{ env.IMAGE }} \
            bash /src/scripts/bootstrap.sh

      - name: Verify bootstrap
        run: |
          docker run --rm \
            -v /opt/bootstrap:/opt/bootstrap:ro \
            ${{ env.IMAGE }} \
            bash -c '
              export PATH="/opt/bootstrap/bin:${PATH}"
              export LD_LIBRARY_PATH="/opt/bootstrap/lib64:/opt/bootstrap/lib"
              gcc --version | head -1
              cmake --version | head -1
              ninja --version
              python3 --version
              swig -version | grep "SWIG Version"
            '

      - name: Package bootstrap for artifact
        run: |
          cd /opt
          tar cf /tmp/bootstrap-tools.tar bootstrap/

      - name: Upload bootstrap artifact
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-tools
          path: /tmp/bootstrap-tools.tar
          retention-days: 3
          compression-level: 1

  # ===========================================================================
  # Job 2: LLVM Stage 1 — minimal clang + lld using bootstrap GCC
  # ===========================================================================
  stage1:
    name: LLVM Stage 1
    needs: bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghcli /opt/hostedtoolcache || true
          df -h /

      - name: Pull container image
        run: docker pull ${{ env.IMAGE }}

      - name: Download bootstrap tools
        uses: actions/download-artifact@v4
        with:
          name: bootstrap-tools
          path: /tmp/artifacts

      - name: Extract bootstrap tools
        run: |
          sudo mkdir -p /opt/bootstrap
          cd /opt
          sudo tar xf /tmp/artifacts/bootstrap-tools.tar
          rm -rf /tmp/artifacts

      - name: Cache LLVM source
        id: cache-llvm-src
        uses: actions/cache@v4
        with:
          path: /tmp/llvm-project
          key: llvm-src-${{ env.LLVM_VERSION }}

      - name: Build LLVM Stage 1
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/src:ro \
            -v /opt/bootstrap:/opt/bootstrap:ro \
            -v /opt/stage1:/opt/stage1 \
            -v /tmp:/tmp \
            -e BOOTSTRAP_PREFIX=/opt/bootstrap \
            -e STAGE1_PREFIX=/opt/stage1 \
            -e LLVM_VERSION=${{ env.LLVM_VERSION }} \
            ${{ env.IMAGE }} \
            bash -c '
              apt-get update -qq
              DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
                ca-certificates curl file patchelf xz-utils
              export PATH="/opt/bootstrap/bin:${PATH}"
              export LD_LIBRARY_PATH="/opt/bootstrap/lib64:/opt/bootstrap/lib"
              bash /src/scripts/build-llvm-stage1.sh
            '

      - name: Verify Stage 1
        run: |
          docker run --rm \
            -v /opt/stage1:/opt/stage1:ro \
            -v /opt/bootstrap:/opt/bootstrap:ro \
            ${{ env.IMAGE }} \
            bash -c '
              export LD_LIBRARY_PATH="/opt/stage1/lib:/opt/bootstrap/lib64:/opt/bootstrap/lib"
              /opt/stage1/bin/clang --version
              /opt/stage1/bin/ld.lld --version
            '

      - name: Package Stage 1 for artifact
        run: |
          cd /opt
          tar cf /tmp/stage1-install.tar stage1/

      - name: Upload Stage 1 artifact
        uses: actions/upload-artifact@v4
        with:
          name: stage1-install
          path: /tmp/stage1-install.tar
          retention-days: 1
          compression-level: 1

  # ===========================================================================
  # Job 3: LLVM Stage 2 — main toolchain (full suite, self-hosted)
  # ===========================================================================
  stage2-main:
    name: LLVM Stage 2 (main)
    needs: [bootstrap, stage1]
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghcli /opt/hostedtoolcache || true
          df -h /

      - name: Pull container image
        run: docker pull ${{ env.IMAGE }}

      - name: Download bootstrap tools
        uses: actions/download-artifact@v4
        with:
          name: bootstrap-tools
          path: /tmp/artifacts

      - name: Download Stage 1
        uses: actions/download-artifact@v4
        with:
          name: stage1-install
          path: /tmp/artifacts-s1

      - name: Extract artifacts
        run: |
          sudo mkdir -p /opt/bootstrap /opt/stage1
          cd /opt
          sudo tar xf /tmp/artifacts/bootstrap-tools.tar
          sudo tar xf /tmp/artifacts-s1/stage1-install.tar
          rm -rf /tmp/artifacts /tmp/artifacts-s1

      - name: Cache LLVM source
        uses: actions/cache@v4
        with:
          path: /tmp/llvm-project
          key: llvm-src-${{ env.LLVM_VERSION }}

      - name: Build LLVM Stage 2 (main)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/src:ro \
            -v /opt/bootstrap:/opt/bootstrap:ro \
            -v /opt/stage1:/opt/stage1:ro \
            -v /tmp:/tmp \
            -e BOOTSTRAP_PREFIX=/opt/bootstrap \
            -e STAGE1_PREFIX=/opt/stage1 \
            -e LLVM_VERSION=${{ env.LLVM_VERSION }} \
            -e VARIANT=main \
            -e INSTALL_PREFIX=/opt/coca-toolchain \
            ${{ env.IMAGE }} \
            bash -c '
              apt-get update -qq
              DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
                ca-certificates curl file patchelf xz-utils libc6-dev
              export PATH="/opt/stage1/bin:/opt/bootstrap/bin:${PATH}"
              export LD_LIBRARY_PATH="/opt/stage1/lib:/opt/bootstrap/lib64:/opt/bootstrap/lib"
              bash /src/scripts/build-llvm-stage2.sh
            '

      - name: Upload main toolchain
        uses: actions/upload-artifact@v4
        with:
          name: coca-toolchain-linux-x86_64
          path: /tmp/coca-toolchain-linux-x86_64.tar.xz
          retention-days: 14

  # ===========================================================================
  # Job 4: LLVM Stage 2 — p2996 (Bloomberg C++ reflection fork)
  # ===========================================================================
  stage2-p2996:
    name: LLVM Stage 2 (p2996)
    needs: [bootstrap, stage1]
    if: ${{ github.event.inputs.build_p2996 != 'false' }}
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghcli /opt/hostedtoolcache || true
          df -h /

      - name: Pull container image
        run: docker pull ${{ env.IMAGE }}

      - name: Download bootstrap tools
        uses: actions/download-artifact@v4
        with:
          name: bootstrap-tools
          path: /tmp/artifacts

      - name: Download Stage 1
        uses: actions/download-artifact@v4
        with:
          name: stage1-install
          path: /tmp/artifacts-s1

      - name: Extract artifacts
        run: |
          sudo mkdir -p /opt/bootstrap /opt/stage1
          cd /opt
          sudo tar xf /tmp/artifacts/bootstrap-tools.tar
          sudo tar xf /tmp/artifacts-s1/stage1-install.tar
          rm -rf /tmp/artifacts /tmp/artifacts-s1

      - name: Build LLVM Stage 2 (p2996)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/src:ro \
            -v /opt/bootstrap:/opt/bootstrap:ro \
            -v /opt/stage1:/opt/stage1:ro \
            -v /tmp:/tmp \
            -e BOOTSTRAP_PREFIX=/opt/bootstrap \
            -e STAGE1_PREFIX=/opt/stage1 \
            -e LLVM_VERSION=${{ env.LLVM_VERSION }} \
            -e VARIANT=p2996 \
            -e INSTALL_PREFIX=/opt/coca-toolchain-p2996 \
            ${{ env.IMAGE }} \
            bash -c '
              apt-get update -qq
              DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
                ca-certificates curl file patchelf xz-utils libc6-dev
              export PATH="/opt/stage1/bin:/opt/bootstrap/bin:${PATH}"
              export LD_LIBRARY_PATH="/opt/stage1/lib:/opt/bootstrap/lib64:/opt/bootstrap/lib"
              bash /src/scripts/build-llvm-stage2.sh
            '

      - name: Upload p2996 toolchain
        uses: actions/upload-artifact@v4
        with:
          name: coca-toolchain-p2996-linux-x86_64
          path: /tmp/coca-toolchain-p2996-linux-x86_64.tar.xz
          retention-days: 14

  # ===========================================================================
  # Job 5: Portability verification on multiple Ubuntu versions
  # ===========================================================================
  verify:
    name: Verify (${{ matrix.distro }})
    needs: [stage2-main]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        distro:
          - ubuntu:16.04
          - ubuntu:18.04
          - ubuntu:20.04
          - ubuntu:22.04
          - ubuntu:24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download main toolchain
        uses: actions/download-artifact@v4
        with:
          name: coca-toolchain-linux-x86_64
          path: /tmp

      - name: Extract toolchain
        run: |
          sudo mkdir -p /opt
          cd /opt
          sudo tar xf /tmp/coca-toolchain-linux-x86_64.tar.xz

      - name: Run portability tests in container
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/src:ro \
            -v /opt:/opt:ro \
            -e TOOLCHAIN_DIR=/opt/coca-toolchain-linux-x86_64 \
            ${{ matrix.distro }} \
            bash -c '
              bash /src/scripts/verify-portability.sh
            '

  # ===========================================================================
  # Job 6: Verify p2996 variant portability
  # ===========================================================================
  verify-p2996:
    name: Verify p2996 (${{ matrix.distro }})
    needs: [stage2-p2996]
    if: ${{ github.event.inputs.build_p2996 != 'false' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        distro:
          - ubuntu:16.04
          - ubuntu:20.04
          - ubuntu:24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download p2996 toolchain
        uses: actions/download-artifact@v4
        with:
          name: coca-toolchain-p2996-linux-x86_64
          path: /tmp

      - name: Extract toolchain
        run: |
          sudo mkdir -p /opt
          cd /opt
          sudo tar xf /tmp/coca-toolchain-p2996-linux-x86_64.tar.xz

      - name: Run portability tests in container
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/src:ro \
            -v /opt:/opt:ro \
            -e TOOLCHAIN_DIR=/opt/coca-toolchain-p2996-linux-x86_64 \
            ${{ matrix.distro }} \
            bash -c '
              bash /src/scripts/verify-portability.sh
            '
