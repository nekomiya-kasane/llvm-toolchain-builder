name: Build LLVM Toolchain (Ubuntu 16.04 x86_64)
# Architecture: actions/* steps (checkout, cache, artifact) run on the runner
# host (ubuntu-latest, glibc 2.35+). All compilation runs inside ubuntu:16.04
# via `docker run` with bind mounts — this avoids the Node.js 20 / glibc 2.28
# incompatibility that blocks actions/* inside a 16.04 container.
#
# Caching strategy:
#   - Bootstrap:  actions/cache keyed on bootstrap script hashes
#   - LLVM src:   actions/cache keyed on LLVM_VERSION
#   - Stage 1:    actions/cache keyed on LLVM_VERSION + bootstrap/stage1 script hashes
#   - Stage 2:    actions/cache keyed on LLVM_VERSION + variant + all script hashes
#   Each stage skips compilation on cache hit and only uploads the artifact.
#   Artifacts are uploaded from cache so downstream jobs can consume them
#   even across different workflow runs.

on:
  workflow_dispatch:
    inputs:
      llvm_version:
        description: 'LLVM version to build'
        required: true
        default: '21.1.1'
      build_p2996:
        description: 'Also build p2996 variant'
        type: boolean
        default: true
      force_rebuild:
        description: 'Force rebuild (ignore cache)'
        type: boolean
        default: false
  push:
    branches: [main]
    paths:
      - 'scripts/common/**'
      - 'scripts/bootstrap/**'
      - 'scripts/linux-x64/**'
      - 'scripts/ubuntu-16.04/**'
      - '.github/workflows/build-toolchain.yml'

env:
  BOOTSTRAP_PREFIX: /opt/bootstrap
  STAGE1_PREFIX: /opt/stage1
  LLVM_VERSION: ${{ github.event.inputs.llvm_version || '21.1.1' }}
  IMAGE: ubuntu:16.04

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # Job 1: Bootstrap — build GCC, CMake, Python, Ninja, SWIG, and dependencies
  # ===========================================================================
  bootstrap:
    name: Bootstrap Tools
    runs-on: ubuntu-latest
    timeout-minutes: 540
    outputs:
      cache-hit: ${{ steps.cache-bootstrap.outputs.cache-hit }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghcli /opt/hostedtoolcache || true
          df -h /

      - name: Cache bootstrap
        id: cache-bootstrap
        uses: actions/cache@v4
        with:
          path: /opt/bootstrap
          key: x64-bootstrap-v9-${{ hashFiles('scripts/bootstrap/common-bootstrap.sh', 'scripts/bootstrap/ubuntu-16.04.sh', 'scripts/common/versions.sh') }}
          restore-keys: |
            x64-bootstrap-v9-

      - name: Pull container image
        if: steps.cache-bootstrap.outputs.cache-hit != 'true'
        run: docker pull ${{ env.IMAGE }}

      - name: Build bootstrap tools
        if: steps.cache-bootstrap.outputs.cache-hit != 'true'
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/src:ro \
            -v /opt/bootstrap:/opt/bootstrap \
            -e BOOTSTRAP_PREFIX=/opt/bootstrap \
            ${{ env.IMAGE }} \
            bash /src/scripts/bootstrap/ubuntu-16.04.sh

      - name: Verify bootstrap
        run: |
          docker run --rm \
            -v /opt/bootstrap:/opt/bootstrap:ro \
            ${{ env.IMAGE }} \
            bash -c '
              export PATH="/opt/bootstrap/bin:${PATH}"
              export LD_LIBRARY_PATH="/opt/bootstrap/lib64:/opt/bootstrap/lib"
              gcc --version | head -1
              cmake --version | head -1
              ninja --version
              python3 --version
              swig -version | grep "SWIG Version"
            '
        if: steps.cache-bootstrap.outputs.cache-hit != 'true'

      - name: Package bootstrap for artifact
        run: |
          cd /opt
          tar cf /tmp/bootstrap-tools.tar bootstrap/

      - name: Upload bootstrap artifact
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-tools
          path: /tmp/bootstrap-tools.tar
          retention-days: 7
          compression-level: 1

  # ===========================================================================
  # Job 2: LLVM Stage 1 — minimal clang + lld using bootstrap GCC
  # ===========================================================================
  stage1:
    name: LLVM Stage 1
    needs: bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 540
    outputs:
      cache-hit: ${{ steps.cache-stage1.outputs.cache-hit }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghcli /opt/hostedtoolcache || true
          df -h /

      - name: Cache Stage 1
        id: cache-stage1
        uses: actions/cache@v4
        with:
          path: /opt/stage1
          key: x64-stage1-v1-llvm${{ env.LLVM_VERSION }}-${{ hashFiles('scripts/common/versions.sh', 'scripts/common/source.sh', 'scripts/common/llvm-config.sh', 'scripts/linux-x64/build-llvm-stage1.sh') }}

      - name: Download bootstrap tools
        if: steps.cache-stage1.outputs.cache-hit != 'true'
        uses: actions/download-artifact@v4
        with:
          name: bootstrap-tools
          path: /tmp/artifacts

      - name: Extract bootstrap tools
        if: steps.cache-stage1.outputs.cache-hit != 'true'
        run: |
          sudo mkdir -p /opt/bootstrap
          cd /opt
          sudo tar xf /tmp/artifacts/bootstrap-tools.tar
          rm -rf /tmp/artifacts

      - name: Cache LLVM source
        if: steps.cache-stage1.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: /tmp/llvm-project
          key: llvm-src-${{ env.LLVM_VERSION }}

      - name: Pull container image
        if: steps.cache-stage1.outputs.cache-hit != 'true'
        run: docker pull ${{ env.IMAGE }}

      - name: Build LLVM Stage 1
        if: steps.cache-stage1.outputs.cache-hit != 'true'
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/src:ro \
            -v /opt/bootstrap:/opt/bootstrap:ro \
            -v /opt/stage1:/opt/stage1 \
            -v /tmp:/tmp \
            -e BOOTSTRAP_PREFIX=/opt/bootstrap \
            -e STAGE1_PREFIX=/opt/stage1 \
            -e LLVM_VERSION=${{ env.LLVM_VERSION }} \
            ${{ env.IMAGE }} \
            bash -c '
              apt-get update -qq
              DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
                ca-certificates curl file patchelf xz-utils git
              export PATH="/opt/bootstrap/bin:${PATH}"
              export LD_LIBRARY_PATH="/opt/bootstrap/lib64:/opt/bootstrap/lib"
              bash /src/scripts/linux-x64/build-llvm-stage1.sh
            '

      - name: Verify Stage 1
        if: steps.cache-stage1.outputs.cache-hit != 'true'
        run: |
          docker run --rm \
            -v /opt/stage1:/opt/stage1:ro \
            -v /opt/bootstrap:/opt/bootstrap:ro \
            ${{ env.IMAGE }} \
            bash -c '
              export LD_LIBRARY_PATH="/opt/stage1/lib:/opt/bootstrap/lib64:/opt/bootstrap/lib"
              /opt/stage1/bin/clang --version
              /opt/stage1/bin/ld.lld --version
            '

      - name: Package Stage 1 for artifact
        run: |
          cd /opt
          tar cf /tmp/stage1-install.tar stage1/

      - name: Upload Stage 1 artifact
        uses: actions/upload-artifact@v4
        with:
          name: stage1-install
          path: /tmp/stage1-install.tar
          retention-days: 7
          compression-level: 1

  # ===========================================================================
  # Job 3: LLVM Stage 2 — main toolchain (full suite, self-hosted)
  # ===========================================================================
  stage2-main:
    name: LLVM Stage 2 (main)
    needs: [bootstrap, stage1]
    runs-on: ubuntu-latest
    timeout-minutes: 540
    outputs:
      cache-hit: ${{ steps.cache-stage2.outputs.cache-hit }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghcli /opt/hostedtoolcache || true
          df -h /

      - name: Cache Stage 2 (main)
        id: cache-stage2
        uses: actions/cache@v4
        with:
          path: /tmp/coca-toolchain-linux-x86_64.tar.xz
          key: x64-stage2-main-v1-llvm${{ env.LLVM_VERSION }}-${{ hashFiles('scripts/common/**', 'scripts/linux-x64/build-llvm-stage2.sh') }}

      - name: Pull container image
        if: steps.cache-stage2.outputs.cache-hit != 'true'
        run: docker pull ${{ env.IMAGE }}

      - name: Download bootstrap tools
        if: steps.cache-stage2.outputs.cache-hit != 'true'
        uses: actions/download-artifact@v4
        with:
          name: bootstrap-tools
          path: /tmp/artifacts

      - name: Download Stage 1
        if: steps.cache-stage2.outputs.cache-hit != 'true'
        uses: actions/download-artifact@v4
        with:
          name: stage1-install
          path: /tmp/artifacts-s1

      - name: Extract artifacts
        if: steps.cache-stage2.outputs.cache-hit != 'true'
        run: |
          sudo mkdir -p /opt/bootstrap /opt/stage1
          cd /opt
          sudo tar xf /tmp/artifacts/bootstrap-tools.tar
          sudo tar xf /tmp/artifacts-s1/stage1-install.tar
          rm -rf /tmp/artifacts /tmp/artifacts-s1

      - name: Cache LLVM source
        if: steps.cache-stage2.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: /tmp/llvm-project
          key: llvm-src-${{ env.LLVM_VERSION }}

      - name: Build LLVM Stage 2 (main)
        if: steps.cache-stage2.outputs.cache-hit != 'true'
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/src:ro \
            -v /opt/bootstrap:/opt/bootstrap:ro \
            -v /opt/stage1:/opt/stage1:ro \
            -v /tmp:/tmp \
            -e BOOTSTRAP_PREFIX=/opt/bootstrap \
            -e STAGE1_PREFIX=/opt/stage1 \
            -e LLVM_VERSION=${{ env.LLVM_VERSION }} \
            -e VARIANT=main \
            -e INSTALL_PREFIX=/opt/coca-toolchain \
            ${{ env.IMAGE }} \
            bash -c '
              apt-get update -qq
              DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
                ca-certificates curl file patchelf xz-utils libc6-dev git
              export PATH="/opt/stage1/bin:/opt/bootstrap/bin:${PATH}"
              export LD_LIBRARY_PATH="/opt/stage1/lib:/opt/bootstrap/lib64:/opt/bootstrap/lib"
              bash /src/scripts/linux-x64/build-llvm-stage2.sh
            '

      - name: Upload main toolchain
        uses: actions/upload-artifact@v4
        with:
          name: coca-toolchain-linux-x86_64
          path: /tmp/coca-toolchain-linux-x86_64.tar.xz
          retention-days: 30

  # ===========================================================================
  # Job 4: LLVM Stage 2 — p2996 (Bloomberg C++ reflection fork)
  # ===========================================================================
  stage2-p2996:
    name: LLVM Stage 2 (p2996)
    needs: [bootstrap, stage1]
    if: ${{ github.event.inputs.build_p2996 != 'false' }}
    runs-on: ubuntu-latest
    timeout-minutes: 540
    outputs:
      cache-hit: ${{ steps.cache-stage2-p2996.outputs.cache-hit }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghcli /opt/hostedtoolcache || true
          df -h /

      - name: Cache Stage 2 (p2996)
        id: cache-stage2-p2996
        uses: actions/cache@v4
        with:
          path: /tmp/coca-toolchain-p2996-linux-x86_64.tar.xz
          key: x64-stage2-p2996-v1-llvm${{ env.LLVM_VERSION }}-${{ hashFiles('scripts/common/**', 'scripts/linux-x64/build-llvm-stage2.sh') }}

      - name: Pull container image
        if: steps.cache-stage2-p2996.outputs.cache-hit != 'true'
        run: docker pull ${{ env.IMAGE }}

      - name: Download bootstrap tools
        if: steps.cache-stage2-p2996.outputs.cache-hit != 'true'
        uses: actions/download-artifact@v4
        with:
          name: bootstrap-tools
          path: /tmp/artifacts

      - name: Download Stage 1
        if: steps.cache-stage2-p2996.outputs.cache-hit != 'true'
        uses: actions/download-artifact@v4
        with:
          name: stage1-install
          path: /tmp/artifacts-s1

      - name: Extract artifacts
        if: steps.cache-stage2-p2996.outputs.cache-hit != 'true'
        run: |
          sudo mkdir -p /opt/bootstrap /opt/stage1
          cd /opt
          sudo tar xf /tmp/artifacts/bootstrap-tools.tar
          sudo tar xf /tmp/artifacts-s1/stage1-install.tar
          rm -rf /tmp/artifacts /tmp/artifacts-s1

      - name: Build LLVM Stage 2 (p2996)
        if: steps.cache-stage2-p2996.outputs.cache-hit != 'true'
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/src:ro \
            -v /opt/bootstrap:/opt/bootstrap:ro \
            -v /opt/stage1:/opt/stage1:ro \
            -v /tmp:/tmp \
            -e BOOTSTRAP_PREFIX=/opt/bootstrap \
            -e STAGE1_PREFIX=/opt/stage1 \
            -e LLVM_VERSION=${{ env.LLVM_VERSION }} \
            -e VARIANT=p2996 \
            -e INSTALL_PREFIX=/opt/coca-toolchain-p2996 \
            ${{ env.IMAGE }} \
            bash -c '
              apt-get update -qq
              DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
                ca-certificates curl file patchelf xz-utils libc6-dev git
              export PATH="/opt/stage1/bin:/opt/bootstrap/bin:${PATH}"
              export LD_LIBRARY_PATH="/opt/stage1/lib:/opt/bootstrap/lib64:/opt/bootstrap/lib"
              bash /src/scripts/linux-x64/build-llvm-stage2.sh
            '

      - name: Upload p2996 toolchain
        uses: actions/upload-artifact@v4
        with:
          name: coca-toolchain-p2996-linux-x86_64
          path: /tmp/coca-toolchain-p2996-linux-x86_64.tar.xz
          retention-days: 30

  # ===========================================================================
  # Job 5: Portability verification on multiple Ubuntu versions
  # ===========================================================================
  verify:
    name: Verify (${{ matrix.distro }})
    needs: [stage2-main]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        distro:
          - ubuntu:16.04
          - ubuntu:18.04
          - ubuntu:20.04
          - ubuntu:22.04
          - ubuntu:24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download main toolchain
        uses: actions/download-artifact@v4
        with:
          name: coca-toolchain-linux-x86_64
          path: /tmp

      - name: Extract toolchain
        run: |
          sudo mkdir -p /opt
          cd /opt
          sudo tar xf /tmp/coca-toolchain-linux-x86_64.tar.xz

      - name: Run portability tests in container
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/src:ro \
            -v /opt:/opt:ro \
            -e TOOLCHAIN_DIR=/opt/coca-toolchain-linux-x86_64 \
            ${{ matrix.distro }} \
            bash -c '
              bash /src/scripts/ubuntu-16.04/verify-portability.sh
            '

  # ===========================================================================
  # Job 6: Verify p2996 variant portability
  # ===========================================================================
  verify-p2996:
    name: Verify p2996 (${{ matrix.distro }})
    needs: [stage2-p2996]
    if: ${{ github.event.inputs.build_p2996 != 'false' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        distro:
          - ubuntu:16.04
          - ubuntu:20.04
          - ubuntu:24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download p2996 toolchain
        uses: actions/download-artifact@v4
        with:
          name: coca-toolchain-p2996-linux-x86_64
          path: /tmp

      - name: Extract toolchain
        run: |
          sudo mkdir -p /opt
          cd /opt
          sudo tar xf /tmp/coca-toolchain-p2996-linux-x86_64.tar.xz

      - name: Run portability tests in container
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/src:ro \
            -v /opt:/opt:ro \
            -e TOOLCHAIN_DIR=/opt/coca-toolchain-p2996-linux-x86_64 \
            ${{ matrix.distro }} \
            bash -c '
              bash /src/scripts/ubuntu-16.04/verify-portability.sh
            '
