name: Build LLVM Toolchain (Ubuntu 16.04)

on:
  workflow_dispatch:
    inputs:
      llvm_version:
        description: 'LLVM version to build'
        required: true
        default: '21.1.1'
      build_p2996:
        description: 'Also build p2996 variant'
        type: boolean
        default: true
      skip_bootstrap:
        description: 'Skip bootstrap (use cached)'
        type: boolean
        default: false
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - '.github/workflows/build-toolchain.yml'

env:
  BOOTSTRAP_PREFIX: /opt/bootstrap
  STAGE1_PREFIX: /opt/stage1
  LLVM_VERSION: ${{ github.event.inputs.llvm_version || '21.1.1' }}

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # Job 1: Bootstrap — build GCC, CMake, Python, Ninja, SWIG, and dependencies
  # ===========================================================================
  bootstrap:
    name: Bootstrap Tools
    runs-on: ubuntu-latest
    container:
      image: ubuntu:16.04
    timeout-minutes: 180
    steps:
      - name: Install git (build from source if needed)
        run: |
          apt-get update -qq
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            ca-certificates curl make gcc libssl-dev libcurl4-openssl-dev \
            libexpat1-dev gettext zlib1g-dev autoconf
          GIT_VER=2.47.2
          curl -fsSL "https://mirrors.edge.kernel.org/pub/software/scm/git/git-${GIT_VER}.tar.gz" -o /tmp/git.tar.gz
          tar xzf /tmp/git.tar.gz -C /tmp
          make -C "/tmp/git-${GIT_VER}" prefix=/usr/local -j$(nproc) NO_TCLTK=1 NO_PERL=1 all
          make -C "/tmp/git-${GIT_VER}" prefix=/usr/local NO_TCLTK=1 NO_PERL=1 install
          rm -rf "/tmp/git-${GIT_VER}" /tmp/git.tar.gz
          git --version

      - name: Checkout
        uses: actions/checkout@v3

      - name: Free disk space
        run: |
          df -h /
          rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghcli || true
          df -h /

      - name: Cache bootstrap
        id: cache-bootstrap
        uses: actions/cache@v4
        with:
          path: /opt/bootstrap
          key: bootstrap-v6-gcc14.2-cmake3.31-py3.12-${{ hashFiles('scripts/bootstrap.sh') }}
          restore-keys: |
            bootstrap-v6-gcc14.2-cmake3.31-py3.12-

      - name: Build bootstrap tools
        if: steps.cache-bootstrap.outputs.cache-hit != 'true'
        run: |
          chmod +x scripts/bootstrap.sh
          bash scripts/bootstrap.sh

      - name: Verify bootstrap
        run: |
          export PATH="/opt/bootstrap/bin:${PATH}"
          export LD_LIBRARY_PATH="/opt/bootstrap/lib64:/opt/bootstrap/lib"
          gcc --version | head -1
          cmake --version | head -1
          ninja --version
          python3 --version
          swig -version | grep "SWIG Version"

      - name: Package bootstrap for artifact
        run: |
          cd /opt
          tar cf /tmp/bootstrap-tools.tar bootstrap/

      - name: Upload bootstrap artifact
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-tools
          path: /tmp/bootstrap-tools.tar
          retention-days: 3
          compression-level: 1

  # ===========================================================================
  # Job 2: LLVM Stage 1 — minimal clang + lld using bootstrap GCC
  # ===========================================================================
  stage1:
    name: LLVM Stage 1
    needs: bootstrap
    runs-on: ubuntu-latest
    container:
      image: ubuntu:16.04
    timeout-minutes: 120
    steps:
      - name: Install git (build from source if needed)
        run: |
          apt-get update -qq
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            ca-certificates curl make gcc libssl-dev libcurl4-openssl-dev \
            libexpat1-dev gettext zlib1g-dev autoconf
          GIT_VER=2.47.2
          curl -fsSL "https://mirrors.edge.kernel.org/pub/software/scm/git/git-${GIT_VER}.tar.gz" -o /tmp/git.tar.gz
          tar xzf /tmp/git.tar.gz -C /tmp
          make -C "/tmp/git-${GIT_VER}" prefix=/usr/local -j$(nproc) NO_TCLTK=1 NO_PERL=1 all
          make -C "/tmp/git-${GIT_VER}" prefix=/usr/local NO_TCLTK=1 NO_PERL=1 install
          rm -rf "/tmp/git-${GIT_VER}" /tmp/git.tar.gz
          git --version

      - name: Checkout
        uses: actions/checkout@v3

      - name: Free disk space
        run: |
          rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghcli || true
          df -h /

      - name: Download bootstrap tools
        uses: actions/download-artifact@v4
        with:
          name: bootstrap-tools
          path: /tmp/artifacts

      - name: Extract bootstrap tools
        run: |
          cd /opt
          tar xf /tmp/artifacts/bootstrap-tools.tar
          rm -rf /tmp/artifacts
          chmod -R +x /opt/bootstrap/bin/

      - name: Install system deps
        run: |
          apt-get update -qq
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            curl file patchelf xz-utils

      - name: Cache LLVM source
        id: cache-llvm-src
        uses: actions/cache@v4
        with:
          path: /tmp/llvm-project
          key: llvm-src-${{ env.LLVM_VERSION }}

      - name: Build LLVM Stage 1
        run: |
          export PATH="/opt/bootstrap/bin:${PATH}"
          export LD_LIBRARY_PATH="/opt/bootstrap/lib64:/opt/bootstrap/lib"
          chmod +x scripts/build-llvm-stage1.sh
          bash scripts/build-llvm-stage1.sh

      - name: Verify Stage 1
        run: |
          export LD_LIBRARY_PATH="/opt/stage1/lib:/opt/bootstrap/lib64:/opt/bootstrap/lib"
          /opt/stage1/bin/clang --version
          /opt/stage1/bin/ld.lld --version

      - name: Package Stage 1 for artifact
        run: |
          cd /opt
          tar cf /tmp/stage1-install.tar stage1/

      - name: Upload Stage 1 artifact
        uses: actions/upload-artifact@v4
        with:
          name: stage1-install
          path: /tmp/stage1-install.tar
          retention-days: 1
          compression-level: 1

  # ===========================================================================
  # Job 3: LLVM Stage 2 — main toolchain (full suite, self-hosted)
  # ===========================================================================
  stage2-main:
    name: LLVM Stage 2 (main)
    needs: [bootstrap, stage1]
    runs-on: ubuntu-latest
    container:
      image: ubuntu:16.04
    timeout-minutes: 300
    steps:
      - name: Install git + deps (build git from source if needed)
        run: |
          apt-get update -qq
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            ca-certificates curl file patchelf xz-utils libc6-dev \
            make gcc libssl-dev libcurl4-openssl-dev libexpat1-dev gettext zlib1g-dev autoconf
          GIT_VER=2.47.2
          curl -fsSL "https://mirrors.edge.kernel.org/pub/software/scm/git/git-${GIT_VER}.tar.gz" -o /tmp/git.tar.gz
          tar xzf /tmp/git.tar.gz -C /tmp
          make -C "/tmp/git-${GIT_VER}" prefix=/usr/local -j$(nproc) NO_TCLTK=1 NO_PERL=1 all
          make -C "/tmp/git-${GIT_VER}" prefix=/usr/local NO_TCLTK=1 NO_PERL=1 install
          rm -rf "/tmp/git-${GIT_VER}" /tmp/git.tar.gz
          git --version

      - name: Checkout
        uses: actions/checkout@v3

      - name: Free disk space
        run: |
          rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghcli || true
          df -h /

      - name: Download bootstrap tools
        uses: actions/download-artifact@v4
        with:
          name: bootstrap-tools
          path: /tmp/artifacts

      - name: Download Stage 1
        uses: actions/download-artifact@v4
        with:
          name: stage1-install
          path: /tmp/artifacts-s1

      - name: Extract & fix permissions
        run: |
          cd /opt
          tar xf /tmp/artifacts/bootstrap-tools.tar
          tar xf /tmp/artifacts-s1/stage1-install.tar
          rm -rf /tmp/artifacts /tmp/artifacts-s1
          chmod -R +x /opt/bootstrap/bin/ /opt/stage1/bin/

      - name: Cache LLVM source
        uses: actions/cache@v4
        with:
          path: /tmp/llvm-project
          key: llvm-src-${{ env.LLVM_VERSION }}

      - name: Build LLVM Stage 2 (main)
        env:
          VARIANT: main
          INSTALL_PREFIX: /opt/coca-toolchain
        run: |
          export PATH="/opt/stage1/bin:/opt/bootstrap/bin:${PATH}"
          export LD_LIBRARY_PATH="/opt/stage1/lib:/opt/bootstrap/lib64:/opt/bootstrap/lib"
          chmod +x scripts/build-llvm-stage2.sh
          bash scripts/build-llvm-stage2.sh

      - name: Upload main toolchain
        uses: actions/upload-artifact@v4
        with:
          name: coca-toolchain-linux-x86_64
          path: /tmp/coca-toolchain-linux-x86_64.tar.xz
          retention-days: 14

  # ===========================================================================
  # Job 4: LLVM Stage 2 — p2996 (Bloomberg C++ reflection fork)
  # ===========================================================================
  stage2-p2996:
    name: LLVM Stage 2 (p2996)
    needs: [bootstrap, stage1]
    if: ${{ github.event.inputs.build_p2996 != 'false' }}
    runs-on: ubuntu-latest
    container:
      image: ubuntu:16.04
    timeout-minutes: 300
    steps:
      - name: Install git + deps (build git from source if needed)
        run: |
          apt-get update -qq
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            ca-certificates curl file patchelf xz-utils libc6-dev \
            make gcc libssl-dev libcurl4-openssl-dev libexpat1-dev gettext zlib1g-dev autoconf
          GIT_VER=2.47.2
          curl -fsSL "https://mirrors.edge.kernel.org/pub/software/scm/git/git-${GIT_VER}.tar.gz" -o /tmp/git.tar.gz
          tar xzf /tmp/git.tar.gz -C /tmp
          make -C "/tmp/git-${GIT_VER}" prefix=/usr/local -j$(nproc) NO_TCLTK=1 NO_PERL=1 all
          make -C "/tmp/git-${GIT_VER}" prefix=/usr/local NO_TCLTK=1 NO_PERL=1 install
          rm -rf "/tmp/git-${GIT_VER}" /tmp/git.tar.gz
          git --version

      - name: Checkout
        uses: actions/checkout@v3

      - name: Free disk space
        run: |
          rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghcli || true
          df -h /

      - name: Download bootstrap tools
        uses: actions/download-artifact@v4
        with:
          name: bootstrap-tools
          path: /tmp/artifacts

      - name: Download Stage 1
        uses: actions/download-artifact@v4
        with:
          name: stage1-install
          path: /tmp/artifacts-s1

      - name: Extract & fix permissions
        run: |
          cd /opt
          tar xf /tmp/artifacts/bootstrap-tools.tar
          tar xf /tmp/artifacts-s1/stage1-install.tar
          rm -rf /tmp/artifacts /tmp/artifacts-s1
          chmod -R +x /opt/bootstrap/bin/ /opt/stage1/bin/

      - name: Build LLVM Stage 2 (p2996)
        env:
          VARIANT: p2996
          INSTALL_PREFIX: /opt/coca-toolchain-p2996
        run: |
          export PATH="/opt/stage1/bin:/opt/bootstrap/bin:${PATH}"
          export LD_LIBRARY_PATH="/opt/stage1/lib:/opt/bootstrap/lib64:/opt/bootstrap/lib"
          chmod +x scripts/build-llvm-stage2.sh
          bash scripts/build-llvm-stage2.sh

      - name: Upload p2996 toolchain
        uses: actions/upload-artifact@v4
        with:
          name: coca-toolchain-p2996-linux-x86_64
          path: /tmp/coca-toolchain-p2996-linux-x86_64.tar.xz
          retention-days: 14

  # ===========================================================================
  # Job 5: Portability verification on multiple Ubuntu versions
  # ===========================================================================
  verify:
    name: Verify (${{ matrix.distro }})
    needs: [stage2-main]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        distro:
          - ubuntu:16.04
          - ubuntu:18.04
          - ubuntu:20.04
          - ubuntu:22.04
          - ubuntu:24.04
    container:
      image: ${{ matrix.distro }}
    timeout-minutes: 45
    steps:
      - name: Ensure git >= 2.18 (build from source on old distros)
        run: |
          apt-get update -qq
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            git ca-certificates curl make gcc libssl-dev libcurl4-openssl-dev \
            libexpat1-dev gettext zlib1g-dev autoconf
          GIT_MINOR=$(git --version | grep -oP '\d+\.\K\d+')
          if [ "${GIT_MINOR:-0}" -lt 18 ]; then
            echo "System git too old, building 2.47.2 from source..."
            GIT_VER=2.47.2
            curl -fsSL "https://mirrors.edge.kernel.org/pub/software/scm/git/git-${GIT_VER}.tar.gz" -o /tmp/git.tar.gz
            tar xzf /tmp/git.tar.gz -C /tmp
            make -C "/tmp/git-${GIT_VER}" prefix=/usr/local -j$(nproc) NO_TCLTK=1 NO_PERL=1 all
            make -C "/tmp/git-${GIT_VER}" prefix=/usr/local NO_TCLTK=1 NO_PERL=1 install
            rm -rf "/tmp/git-${GIT_VER}" /tmp/git.tar.gz
          fi
          git --version

      - name: Checkout
        uses: actions/checkout@v3

      - name: Download main toolchain
        uses: actions/download-artifact@v4
        with:
          name: coca-toolchain-linux-x86_64
          path: /tmp

      - name: Extract toolchain
        run: |
          mkdir -p /opt
          cd /opt
          tar xf /tmp/coca-toolchain-linux-x86_64.tar.xz

      - name: Run portability tests
        env:
          TOOLCHAIN_DIR: /opt/coca-toolchain-linux-x86_64
        run: |
          chmod +x scripts/verify-portability.sh
          bash scripts/verify-portability.sh

  # ===========================================================================
  # Job 6: Verify p2996 variant portability
  # ===========================================================================
  verify-p2996:
    name: Verify p2996 (${{ matrix.distro }})
    needs: [stage2-p2996]
    if: ${{ github.event.inputs.build_p2996 != 'false' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        distro:
          - ubuntu:16.04
          - ubuntu:20.04
          - ubuntu:24.04
    container:
      image: ${{ matrix.distro }}
    timeout-minutes: 45
    steps:
      - name: Ensure git >= 2.18 (build from source on old distros)
        run: |
          apt-get update -qq
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            git ca-certificates curl make gcc libssl-dev libcurl4-openssl-dev \
            libexpat1-dev gettext zlib1g-dev autoconf
          GIT_MINOR=$(git --version | grep -oP '\d+\.\K\d+')
          if [ "${GIT_MINOR:-0}" -lt 18 ]; then
            echo "System git too old, building 2.47.2 from source..."
            GIT_VER=2.47.2
            curl -fsSL "https://mirrors.edge.kernel.org/pub/software/scm/git/git-${GIT_VER}.tar.gz" -o /tmp/git.tar.gz
            tar xzf /tmp/git.tar.gz -C /tmp
            make -C "/tmp/git-${GIT_VER}" prefix=/usr/local -j$(nproc) NO_TCLTK=1 NO_PERL=1 all
            make -C "/tmp/git-${GIT_VER}" prefix=/usr/local NO_TCLTK=1 NO_PERL=1 install
            rm -rf "/tmp/git-${GIT_VER}" /tmp/git.tar.gz
          fi
          git --version

      - name: Checkout
        uses: actions/checkout@v3

      - name: Download p2996 toolchain
        uses: actions/download-artifact@v4
        with:
          name: coca-toolchain-p2996-linux-x86_64
          path: /tmp

      - name: Extract toolchain
        run: |
          mkdir -p /opt
          cd /opt
          tar xf /tmp/coca-toolchain-p2996-linux-x86_64.tar.xz

      - name: Run portability tests
        env:
          TOOLCHAIN_DIR: /opt/coca-toolchain-p2996-linux-x86_64
        run: |
          chmod +x scripts/verify-portability.sh
          bash scripts/verify-portability.sh
